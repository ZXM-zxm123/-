<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑动拼图游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="game-header">
            <h1>滑动拼图游戏</h1>
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-label">步数</span>
                    <span class="stat-value" id="moves">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">时间</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="controls">
                <div class="control-group">
                    <label for="difficulty">难度：</label>
                    <select id="difficulty">
                        <option value="3">3×3</option>
                        <option value="4">4×4</option>
                        <option value="5">5×5</option>
                        <option value="6">6×6</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="theme">主题：</label>
                    <select id="theme">
                        <option value="classic">经典</option>
                        <option value="ocean">海洋</option>
                        <option value="forest">森林</option>
                        <option value="sunset">日落</option>
                    </select>
                </div>
                <div class="button-group">
                    <button id="shuffle-btn" class="btn btn-primary">打乱</button>
                    <button id="undo-btn" class="btn btn-secondary" disabled>撤销</button>
                    <button id="reset-btn" class="btn btn-secondary">重置</button>
                </div>
            </div>

            <div class="game-board-container">
                <div id="game-board" class="game-board"></div>
            </div>

            <div id="victory-message" class="victory-message hidden">
                <h2>恭喜你！</h2>
                <p>你完成了拼图！</p>
                <div class="victory-stats">
                    <span>步数: <span id="final-moves">0</span></span>
                    <span>时间: <span id="final-time">00:00</span></span>
                </div>
                <button id="play-again-btn" class="btn btn-primary">再玩一次</button>
            </div>
        </main>

        <canvas id="fireworks-canvas" class="fireworks-canvas"></canvas>
    </div>

    <script src="bundle.js"></script>
</body>
</html>
